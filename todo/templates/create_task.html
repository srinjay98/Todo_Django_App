{% extends 'base.html' %}

{% block content %}
<div class="card p-4 shadow-sm mx-auto" style="max-width:500px;">
    <h3>Create Task</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Task title" class="form-control mb-3" required>

        <button class="btn btn-primary">Create</button>
    </form>
</div>
{% endblock %}
