{% extends 'base.html' %}

{% block content %}
<div class="card p-4 shadow-sm mx-auto" style="max-width:500px;">
    <h3>Update Task</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title" value="{{ task.title }}" class="form-control mb-3">

        <button class="btn btn-warning">Update</button>
    </form>
</div>
{% endblock %}
